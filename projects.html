<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Projects</title>
        <link rel="stylesheet" href="global.css">
        <link rel="stylesheet" href="projects.css">
        <script src="https://kit.fontawesome.com/3facf2c060.js" crossorigin="anonymous"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>
    <body>

        <!-- Navbar injected by components.js -->
        <div id="navbar-placeholder"></div>

        <!-- Hero Section -->
        <div class="main">
            <div class="main__container">
                <div class="main__content">
                    <h1>My Projects</h1>
                    <p>Scroll Below to see what I have worked on!</p>
                </div>
                <div class="main__img--container">
                    <img src="Images/pic5.svg" alt="projects illustration" id="main__img">
                </div>
            </div>
        </div>

        <!-- Projects Section -->
        <div class="services">
            <h1>Projects</h1>
            <div class="services__container">

                <div class="services__card">
                    <h2>Twitter Bot</h2>
                    <p>Using OpenAI's API, I was able to build a Twitter Bot</p>
                    <button id="TwitterBotBtn"
                        onclick="window.location.href='https://x.com/motiv8daily_'">Find out more</button>
                </div>

                <div class="services__card">
                    <h2>Weather App</h2>
                    <p>A simple Weather App built from a YouTube tutorial</p>
                    <button id="WeatherAppBtn"
                        onclick="window.location.href='https://yzhuangintcd.github.io/yzhuangintcd.github-weatherapp.io/'">Find out more</button>
                </div>

                <div class="services__card">
                    <h2>CodeCraft</h2>
                    <p>Made by coders, for coders</p>
                    <button id="CodeCraftBtn"
                        onclick="window.location.href='https://codecraft.1f106c1j1agn.eu-gb.codeengine.appdomain.cloud/'">Find out more</button>
                </div>

            </div>
        </div>

        <!-- Footer injected by components.js -->
        <div id="footer-placeholder"></div>

        <script src="components.js"></script>

    </body>
</html>
