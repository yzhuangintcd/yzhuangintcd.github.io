<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Me</title>
        <link rel="stylesheet" href="global.css">
        <link rel="stylesheet" href="contact.css">
        <script src="https://kit.fontawesome.com/3facf2c060.js" crossorigin="anonymous"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    </head>
    <body>

        <!-- Navbar injected by components.js -->
        <div id="navbar-placeholder"></div>

        <!-- Hero Section -->
        <div class="main">
            <div class="main__container">
                <div class="main__content">
                    <h1>Contact Me</h1>
                    <p>Scroll below to find a way to get in touch!</p>
                </div>
                <div class="main__img--container">
                    <img src="Images/pic6.svg" alt="contact illustration" id="main__img">
                </div>
                <div class="orange_cat"></div>
            </div>
        </div>

        <!-- Contact Section -->
        <div class="services">
            <h1>Contact Me</h1>
            <div class="services__container">

                <div class="services__card">
                    <h2>Email</h2>
                    <p>Get in touch with me via email.</p>
                    <button id="emailBtn"
                        onclick="window.location.href='mailto:yzhuang@tcd.ie'">Email me</button>
                </div>

                <div class="services__card">
                    <h2>LinkedIn</h2>
                    <p>Connect with me on LinkedIn.</p>
                    <button id="linkedinBtn"
                        onclick="window.location.href='https://www.linkedin.com/in/yuchen-zhuang-246085217/'">Send me a message</button>
                </div>

            </div>
        </div>

        <!-- Footer injected by components.js -->
        <div id="footer-placeholder"></div>

        <script src="components.js"></script>

    </body>
</html>
