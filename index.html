<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>YuChen Zhuang - CS Student</title>
        <link rel="icon" type="image/gif" href="Images/PikachuFavicon.gif">
        <link rel="stylesheet" href="global.css">
        <link rel="stylesheet" href="index.css">
        <script src="https://kit.fontawesome.com/3facf2c060.js"
            crossorigin="anonymous"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet">
    </head>

    <body>

        <!-- Navbar injected by components.js -->
        <div id="navbar-placeholder"></div>

        <!-- Hero Section -->
        <div class="main">
            <div class="main__container">

                <div class="main__content">
                    <h1>Yuchen Zhuang</h1>
                    <p id="typing-animation">CS Student from Trinity College
                        Dublin<span id="cursor-stale">|</span></p>
                    <button class="main__btn" id="theoBtn" type="button">
                        <span class="main__btn-text">Say Hello to Theo!</span>
                    </button>
                </div>

                <div class="golden_theo"></div>

            </div>
        </div>

        <!-- Experiences Section -->
        <div class="services">
            <h1>Experiences</h1>
            <div class="services__container">

                <div class="services__card">
                    <h2>Software Development Intern</h2>
                    <p>Microsoft</p>
                    <button id="MicrosoftBtn"
                        onclick="window.location.href='about.html'">Find out
                        more</button>
                </div>

                <div class="services__card">
                    <h2>Software Development Engineer</h2>
                    <p>IBM</p>
                    <button id="CodeCraftBtn"
                        onclick="window.location.href='about.html'">Find out
                        more</button>
                </div>

                <div class="services__card">
                    <h2>Project Coordinator</h2>
                    <p>Toast Post</p>
                    <button id="ToastPostBtn"
                        onclick="window.location.href='about.html'">Find out
                        more</button>
                </div>

            </div>
        </div>

        <!-- Footer injected by components.js -->
        <div id="footer-placeholder"></div>

        <script src="components.js"></script>
        <script src="index.js"></script>

    </body>
</html>
